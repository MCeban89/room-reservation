<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — RoomBook</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-grid-bg"></div>

    <div class="auth-box">
        <div class="auth-logo">room<span>book</span></div>
        <p class="auth-subtitle">Sistem de rezervare săli de meeting</p>

        <div class="card">
            <div class="card-title" style="font-size:20px;color:var(--text);letter-spacing:-0.3px;margin-bottom:24px;">
                Autentificare
            </div>

            <!-- Mesaj succes după înregistrare -->
            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

            <!-- Eroare login -->
            <div class="alert alert-error" th:if="${param.error}">
                Email sau parolă incorecte.
            </div>

            <!-- Mesaj după logout -->
            <div class="alert alert-success" th:if="${param.logout}">
                Te-ai delogat cu succes.
            </div>

            <!--
                Spring Security procesează automat POST /auth/login
                Câmpurile trebuie să se numească "username" și "password"
                Spring Security le citește automat cu aceste nume
            -->
            <form th:action="@{/auth/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="username" class="form-control"
                           placeholder="user@exemplu.ro" required autofocus/>
                </div>

                <div class="form-group">
                    <label class="form-label">Parolă</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="••••••••" required/>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">
                    Intră în cont
                </button>
            </form>
        </div>

        <p class="auth-footer">
            Nu ai cont?
            <a th:href="@{/auth/register}">Înregistrează-te</a>
        </p>
    </div>
</div>
</body>
</html>
