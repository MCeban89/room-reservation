<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Înregistrare — RoomBook</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-grid-bg"></div>

    <div class="auth-box" style="max-width:480px;">
        <div class="auth-logo">room<span>book</span></div>
        <p class="auth-subtitle">Creează un cont nou</p>

        <div class="card">
            <div class="card-title" style="font-size:20px;color:var(--text);letter-spacing:-0.3px;margin-bottom:24px;">
                Înregistrare
            </div>

            <!-- Eroare generală (ex: email deja există) -->
            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

            <!--
                th:action — Thymeleaf adaugă automat token-ul CSRF
                th:object — leagă formularul de obiectul "registerForm" din Model
                th:field  — leagă câmpul de proprietatea obiectului
            -->
            <form th:action="@{/auth/register}" method="post" th:object="${registerForm}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="form-label">Nume complet</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           placeholder="Ion Popescu" required autofocus/>
                    <!-- Afișează eroarea de validare pentru câmpul name -->
                    <div class="form-error" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           placeholder="ion@companie.ro" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Parolă</label>
                    <input type="password" th:field="*{password}" class="form-control"
                           placeholder="••••••••" required/>
                    <div class="form-hint">Minim 6 caractere</div>
                    <div class="form-error" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                </div>

                <div class="section-label">Informații birou</div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Etaj</label>
                        <input type="number" th:field="*{floor}" class="form-control"
                               placeholder="2" min="0"/>
                        <div class="form-hint">Folosit pentru recomandări</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Departament</label>
                        <input type="text" th:field="*{department}" class="form-control"
                               placeholder="IT, HR..."/>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">
                    Creează cont
                </button>
            </form>
        </div>

        <p class="auth-footer">
            Ai deja cont?
            <a th:href="@{/auth/login}">Autentifică-te</a>
        </p>
    </div>
</div>
</body>
</html>
