<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sală — RoomBook</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar('admin')}"></nav>

<main class="narrow">
    <a th:href="@{/rooms}" class="btn-back">← Înapoi la săli</a>

    <div class="page-title" style="margin-bottom:4px;">
        <!-- Titlu diferit pentru adăugare vs editare -->
        <span th:if="${room == null}">Adaugă <span style="color:var(--accent)">sală</span></span>
        <span th:if="${room != null}">Editează <span style="color:var(--accent)" th:text="${room.name}">sală</span></span>
    </div>
    <p class="page-subtitle" style="margin-bottom:32px;">
        Completează detaliile sălii de meeting
    </p>

    <div class="card">
        <form th:action="${room == null} ? @{/rooms/add} : @{/rooms/{id}/edit(id=${room.id})}"
              method="post"
              th:object="${roomForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label">Numele sălii</label>
                <input type="text" th:field="*{name}" class="form-control"
                       placeholder="ex: Sala Inovație" required/>
                <!-- șters: th:value="${room != null} ? ${room.name}" -->
                <div class="form-error" th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Capacitate (locuri)</label>
                    <input type="number" th:field="*{capacity}" class="form-control"
                           placeholder="10" min="1" required/>
                    <!-- șters: th:value="${room != null} ? ${room.capacity}" -->
                </div>
                <div class="form-group">
                    <label class="form-label">Etaj</label>
                    <input type="number" th:field="*{floor}" class="form-control"
                           placeholder="2" min="0" required/>
                    <!-- șters: th:value="${room != null} ? ${room.floor}" -->
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Descriere (opțional)</label>
                <textarea th:field="*{description}" class="form-control" rows="2"
                          placeholder="Detalii despre sală..."></textarea>
                <!-- șters: th:text="${room != null} ? ${room.description}" -->
            </div>

            <div class="check-group" style="margin-bottom:20px;">
                <label class="check-item">
                    <input type="checkbox" th:field="*{hasProjector}"/>
                    <!-- șters: th:checked="${room != null and room.hasProjector}" -->
                    📽 Proiector
                </label>
                <label class="check-item">
                    <input type="checkbox" th:field="*{hasWhiteboard}"/>
                    📋 Whiteboard
                </label>
                <label class="check-item">
                    <input type="checkbox" th:field="*{hasVideoConference}"/>
                    📹 Sistem videoconferință
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <span th:if="${room == null}">Adaugă sala</span>
                <span th:if="${room != null}">Salvează modificările</span>
            </button>
        </form>
    </div>
</main>

</body>
</html>
