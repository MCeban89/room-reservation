<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Săli — RoomBook</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar('rooms')}"></nav>

<main>
    <div class="page-header">
        <div>
            <div class="page-title">Săli de <span>meeting</span></div>
            <div class="page-subtitle" th:text="${rooms != null ? rooms.size() : 0} + ' săli active'">0 săli</div>
        </div>

        <div style="display:flex;gap:10px;">
            <a th:href="@{/recommendations}" class="btn btn-secondary">✦ Recomandări</a>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/rooms/add}"
               class="btn btn-primary">+ Adaugă sală</a>
        </div>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="grid grid-3" th:if="${not #lists.isEmpty(rooms)}">
        <div class="room-card" th:each="room : ${rooms}">

            <div>
                <div class="room-name" th:text="${room.name}">Sala Inovație</div>
                <div class="room-floor" th:text="'Etaj ' + ${room.floor}">Etaj 2</div>
            </div>

            <div class="room-capacity">
                <strong th:text="${room.capacity}">10</strong>
                <span>locuri</span>
            </div>

            <div class="room-equipment">
                <span class="equip-tag"
                      th:classappend="${room.hasProjector} ? ' on'">
                    📽 Proiector
                </span>
                <span class="equip-tag"
                      th:classappend="${room.hasWhiteboard} ? ' on'">
                    📋 Whiteboard
                </span>
                <span class="equip-tag"
                      th:classappend="${room.hasVideoConference} ? ' on'">
                    📹 Video
                </span>
            </div>

            <div class="room-actions">
                <a th:href="@{/calendar/{id}(id=${room.id})}"
                   class="btn btn-primary btn-sm">Rezervă</a>

                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/rooms/{id}/edit(id=${room.id})}"
                   class="btn btn-secondary btn-sm">Editează</a>

                <form sec:authorize="hasRole('ADMIN')"
                      th:action="@{/rooms/{id}/delete(id=${room.id})}"
                      method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Dezactivezi această sală?')">
                        Dezactivează
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="empty" th:if="${#lists.isEmpty(rooms)}">
        <div class="empty-icon">🏢</div>
        <div class="empty-title">Nu există săli active</div>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/rooms/add}"
           class="btn btn-primary">Adaugă prima sală</a>
    </div>
</main>

</body>
</html>
