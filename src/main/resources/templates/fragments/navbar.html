<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ================================================================
     NAVBAR — fragment reutilizabil
     Folosit în fiecare pagină cu:
     <nav th:replace="~{fragments/navbar :: navbar(activePage='rooms')}"></nav>
     ================================================================ -->
<nav th:fragment="navbar(activePage)">
    <a class="nav-logo" th:href="@{/rooms}">room<span>book</span></a>

    <div class="nav-links">
        <a th:href="@{/rooms}"
           th:classappend="${activePage == 'rooms'} ? ' active'">Săli</a>
        <a th:href="@{/recommendations}"
           th:classappend="${activePage == 'recommendations'} ? ' active'">Recomandări</a>
        <a th:href="@{/reservations/my}"
           th:classappend="${activePage == 'my-reservations'} ? ' active'">Rezervările mele</a>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin}"
           th:classappend="${activePage == 'admin'} ? ' active'">Admin</a>
    </div>

    <div class="nav-right">
        <span class="nav-user">
            Bună, <strong sec:authentication="name">user</strong>
        </span>
        <form th:action="@{/auth/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>
</nav>

</html>
